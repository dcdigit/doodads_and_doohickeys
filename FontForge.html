<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Font — Generative Type Tool</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #050505;
    color: #ccc;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Back nav ── */
  .back-nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 36px;
    background: #0a0a0a;
    border-bottom: 1px solid #222;
    display: flex; align-items: center;
    padding: 0 14px;
    z-index: 100;
    font-size: 0.75rem;
  }
  .back-nav a {
    color: #888; text-decoration: none;
    transition: color 0.2s;
  }
  .back-nav a:hover { color: #00ff88; }
  .back-nav .sep { color: #333; margin: 0 8px; }
  .back-nav .current { color: #fff; }

  /* ── Sidebar ── */
  #sidebar {
    width: 310px;
    background: #111;
    padding: 16px 18px;
    padding-top: 52px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-right: 1px solid #333;
    overflow-y: auto;
    flex-shrink: 0;
    box-shadow: 5px 0 15px rgba(0,0,0,0.5);
    z-index: 10;
    font-size: 0.8rem;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .section-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #888;
    border-bottom: 1px solid #333;
    padding-bottom: 4px;
    margin-top: 6px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .control-group label {
    font-size: 0.7rem;
    color: #aaa;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .control-group label .val {
    color: #666;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.65rem;
    min-width: 36px;
    text-align: right;
  }

  .row-inputs {
    display: flex;
    gap: 8px;
  }
  .row-inputs .control-group { flex: 1; }

  /* Range */
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #333;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: #888;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:hover { background: #00ff88; }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: #888;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }

  /* Number */
  input[type=number] {
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 4px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    width: 70px;
    outline: none;
  }
  input[type=number]:focus { border-color: #00ff88; }

  /* Color */
  input[type=color] {
    -webkit-appearance: none;
    border: 1px solid #444;
    background: #222;
    border-radius: 4px;
    width: 32px; height: 24px;
    cursor: pointer;
    padding: 2px;
  }
  input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type=color]::-webkit-color-swatch { border: none; border-radius: 2px; }

  /* Checkbox */
  input[type=checkbox] { accent-color: #00ff88; }
  .check-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.7rem; color: #aaa;
  }

  /* Textarea */
  textarea {
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 8px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    resize: vertical;
    min-height: 60px;
    outline: none;
    line-height: 1.4;
  }
  textarea:focus { border-color: #00ff88; }

  /* Buttons */
  .btn {
    padding: 8px 12px;
    border-radius: 4px;
    border: 1px solid #444;
    background: #222;
    color: #ccc;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { border-color: #888; color: #fff; }
  .btn-primary {
    background: #00ff88;
    color: #000;
    border-color: #00ff88;
  }
  .btn-primary:hover {
    background: #00cc6a;
    border-color: #00cc6a;
  }
  .btn-row {
    display: flex;
    gap: 6px;
  }
  .btn-row .btn { flex: 1; text-align: center; }

  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .color-row label {
    font-size: 0.7rem;
    color: #aaa;
    min-width: 70px;
  }

  /* ── Canvas Area ── */
  #canvas-wrapper {
    flex-grow: 1;
    padding-top: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #080808;
    overflow: hidden;
    position: relative;
  }
  canvas {
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    border: 1px solid #333;
    cursor: crosshair;
  }

  /* ── Loading overlay ── */
  #loading {
    position: fixed;
    inset: 0;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    color: #888;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 0.4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<nav class="back-nav">
  <a href="index.html">Portfolio</a>
  <span class="sep">/</span>
  <span class="current">Liquid Font</span>
</nav>

<div id="sidebar">

  <!-- Preview Text -->
  <div class="section-title">Preview Text</div>
  <div class="control-group">
    <textarea id="previewText">The quick brown fox jumps over the lazy dog
ABCDEFGHIJKLMNOPQRSTUVWXYZ
abcdefghijklmnopqrstuvwxyz
0123456789 !@#$%&*</textarea>
  </div>
  <div class="control-group">
    <label>Font Size <span class="val" id="fontSizeVal">72</span></label>
    <input type="range" id="fontSize" min="24" max="200" value="72">
  </div>

  <!-- Displacement -->
  <div class="section-title">Displacement</div>
  <div class="row-inputs">
    <div class="control-group">
      <label>Amount <span class="val" id="dispAmountVal">0</span></label>
      <input type="range" id="dispAmount" min="0" max="30" value="0" step="0.5">
    </div>
    <div class="control-group">
      <label>Scale <span class="val" id="dispScaleVal">1.0</span></label>
      <input type="range" id="dispScale" min="0.1" max="5" value="1" step="0.1">
    </div>
  </div>
  <div class="row-inputs">
    <div class="control-group">
      <label>Seed</label>
      <input type="number" id="dispSeed" value="42" min="0" max="9999" style="width:100%">
    </div>
    <div class="control-group" style="justify-content:flex-end">
      <button class="btn" id="randomSeedBtn" style="margin-top:auto">Dice</button>
    </div>
  </div>

  <!-- Roughen -->
  <div class="section-title">Roughen</div>
  <div class="row-inputs">
    <div class="control-group">
      <label>Roughness <span class="val" id="roughAmountVal">0</span></label>
      <input type="range" id="roughAmount" min="0" max="20" value="0" step="0.5">
    </div>
    <div class="control-group">
      <label>Detail <span class="val" id="roughDetailVal">1</span></label>
      <input type="range" id="roughDetail" min="1" max="4" value="1" step="1">
    </div>
  </div>

  <!-- Weight -->
  <div class="section-title">Weight</div>
  <div class="control-group">
    <label>Offset <span class="val" id="weightVal">0</span></label>
    <input type="range" id="weight" min="-50" max="50" value="0" step="1">
  </div>

  <!-- Slant -->
  <div class="section-title">Slant</div>
  <div class="control-group">
    <label>Angle <span class="val" id="slantVal">0°</span></label>
    <input type="range" id="slant" min="-30" max="30" value="0" step="0.5">
  </div>

  <!-- Cursor Push -->
  <div class="section-title">Cursor Push</div>
  <div class="row-inputs">
    <div class="control-group">
      <label>Radius <span class="val" id="pushRadiusVal">120</span></label>
      <input type="range" id="pushRadius" min="30" max="400" value="120" step="5">
    </div>
    <div class="control-group">
      <label>Strength <span class="val" id="pushStrengthVal">40</span></label>
      <input type="range" id="pushStrength" min="0" max="100" value="40" step="1">
    </div>
  </div>

  <!-- Display -->
  <div class="section-title">Display</div>
  <div class="color-row">
    <label>Text</label>
    <input type="color" id="textColor" value="#ffffff">
  </div>
  <div class="color-row">
    <label>Background</label>
    <input type="color" id="bgColor" value="#080808">
  </div>
  <div class="check-row">
    <input type="checkbox" id="showBaselines">
    <label for="showBaselines">Baseline guides</label>
  </div>

  <!-- Actions -->
  <div class="section-title" style="margin-top:8px">Actions</div>
  <div class="btn-row">
    <button class="btn" id="randomizeBtn">Randomize</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="exportOTFBtn">Export .OTF</button>
    <button class="btn" id="exportPNGBtn">Save PNG</button>
  </div>

</div>

<div id="canvas-wrapper">
  <canvas id="cv"></canvas>
</div>

<div id="loading">Loading font...</div>

<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
<script>
(function() {
  'use strict';

  // ── Elements ──
  const $ = id => document.getElementById(id);
  const cv = $('cv');
  const ctx = cv.getContext('2d');
  const wrapper = $('canvas-wrapper');

  // ── State ──
  let baseFont = null;
  let dirty = true;

  // ── Mouse state for direct manipulation ──
  let mouseX = -9999, mouseY = -9999;
  let mouseDown = false;

  cv.addEventListener('mousemove', e => {
    const rect = cv.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
    dirty = true;
  });
  cv.addEventListener('mouseleave', () => {
    mouseX = -9999; mouseY = -9999;
    dirty = true;
  });
  cv.addEventListener('mousedown', () => { mouseDown = true; });
  window.addEventListener('mouseup', () => { mouseDown = false; });

  // ── Seeded PRNG (mulberry32) ──
  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      let t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // ── Seeded spatial noise (value noise with interpolation) ──
  function createNoise2D(seed) {
    const SIZE = 256;
    const perm = new Uint8Array(SIZE * 2);
    const grad = new Float32Array(SIZE);
    const rng = mulberry32(seed);
    for (let i = 0; i < SIZE; i++) {
      grad[i] = rng() * 2 - 1;
      perm[i] = i;
    }
    for (let i = SIZE - 1; i > 0; i--) {
      const j = (rng() * (i + 1)) | 0;
      [perm[i], perm[j]] = [perm[j], perm[i]];
    }
    for (let i = 0; i < SIZE; i++) perm[i + SIZE] = perm[i];

    function hash(ix, iy) {
      return perm[(perm[ix & 255] + iy) & 255];
    }

    return function noise2D(x, y) {
      const ix = Math.floor(x), iy = Math.floor(y);
      const fx = x - ix, fy = y - iy;
      const sx = fx * fx * (3 - 2 * fx);
      const sy = fy * fy * (3 - 2 * fy);
      const n00 = grad[hash(ix, iy) & 255];
      const n10 = grad[hash(ix + 1, iy) & 255];
      const n01 = grad[hash(ix, iy + 1) & 255];
      const n11 = grad[hash(ix + 1, iy + 1) & 255];
      const nx0 = n00 + sx * (n10 - n00);
      const nx1 = n01 + sx * (n11 - n01);
      return nx0 + sy * (nx1 - nx0);
    };
  }

  // ── Read controls ──
  function getParams() {
    return {
      text: $('previewText').value,
      fontSize: +$('fontSize').value,
      dispAmount: +$('dispAmount').value,
      dispScale: +$('dispScale').value,
      dispSeed: +$('dispSeed').value,
      roughAmount: +$('roughAmount').value,
      roughDetail: +$('roughDetail').value,
      weight: +$('weight').value,
      slant: +$('slant').value,
      pushRadius: +$('pushRadius').value,
      pushStrength: +$('pushStrength').value,
      textColor: $('textColor').value,
      bgColor: $('bgColor').value,
      showBaselines: $('showBaselines').checked,
    };
  }

  // ── Value display updates ──
  function bindSlider(id, valId, fmt) {
    const el = $(id);
    const valEl = $(valId);
    const update = () => { valEl.textContent = fmt ? fmt(el.value) : el.value; dirty = true; };
    el.addEventListener('input', update);
  }
  bindSlider('fontSize', 'fontSizeVal');
  bindSlider('dispAmount', 'dispAmountVal');
  bindSlider('dispScale', 'dispScaleVal', v => parseFloat(v).toFixed(1));
  bindSlider('roughAmount', 'roughAmountVal');
  bindSlider('roughDetail', 'roughDetailVal');
  bindSlider('weight', 'weightVal');
  bindSlider('slant', 'slantVal', v => v + '°');
  bindSlider('pushRadius', 'pushRadiusVal');
  bindSlider('pushStrength', 'pushStrengthVal');

  // Mark dirty on any input change
  $('previewText').addEventListener('input', () => dirty = true);
  $('dispSeed').addEventListener('input', () => dirty = true);
  $('textColor').addEventListener('input', () => dirty = true);
  $('bgColor').addEventListener('input', () => dirty = true);
  $('showBaselines').addEventListener('change', () => dirty = true);

  // ── Randomize seed button ──
  $('randomSeedBtn').addEventListener('click', () => {
    $('dispSeed').value = (Math.random() * 9999) | 0;
    dirty = true;
  });

  // ── Randomize all ──
  $('randomizeBtn').addEventListener('click', () => {
    function setSlider(id, val) {
      $(id).value = val;
      $(id).dispatchEvent(new Event('input'));
    }
    setSlider('fontSize', 48 + (Math.random() * 100) | 0);
    setSlider('dispAmount', (Math.random() * 20).toFixed(1));
    setSlider('dispScale', (0.2 + Math.random() * 3.5).toFixed(1));
    $('dispSeed').value = (Math.random() * 9999) | 0;
    setSlider('roughAmount', (Math.random() * 12).toFixed(1));
    setSlider('roughDetail', 1 + (Math.random() * 3) | 0);
    setSlider('weight', (-30 + (Math.random() * 60)) | 0);
    setSlider('slant', (-15 + (Math.random() * 30)).toFixed(1));
    dirty = true;
  });

  // ── Transform pipeline ──

  // Deep clone path commands
  function cloneCommands(cmds) {
    return cmds.map(c => Object.assign({}, c));
  }

  // Compute centroid of a set of path commands
  function computeCentroid(cmds) {
    let sx = 0, sy = 0, n = 0;
    for (const c of cmds) {
      if (c.x !== undefined && c.y !== undefined) {
        sx += c.x; sy += c.y; n++;
      }
      if (c.x1 !== undefined) { sx += c.x1; sy += c.y1; n++; }
      if (c.x2 !== undefined) { sx += c.x2; sy += c.y2; n++; }
    }
    return n > 0 ? { x: sx / n, y: sy / n } : { x: 0, y: 0 };
  }

  // 1. Weight offset — shift points radially from centroid
  function applyWeight(cmds, amount) {
    if (amount === 0) return cmds;
    const { x: cx, y: cy } = computeCentroid(cmds);
    for (const c of cmds) {
      if (c.x !== undefined && c.y !== undefined) {
        const dx = c.x - cx, dy = c.y - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0.01) {
          const factor = amount / dist;
          c.x += dx * factor;
          c.y += dy * factor;
        }
      }
      if (c.x1 !== undefined) {
        const dx = c.x1 - cx, dy = c.y1 - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0.01) {
          const factor = amount / dist;
          c.x1 += dx * factor;
          c.y1 += dy * factor;
        }
      }
      if (c.x2 !== undefined) {
        const dx = c.x2 - cx, dy = c.y2 - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0.01) {
          const factor = amount / dist;
          c.x2 += dx * factor;
          c.y2 += dy * factor;
        }
      }
    }
    return cmds;
  }

  // 2. Slant — horizontal shear: x' = x + (baseline - y) * tan(angle)
  function applySlant(cmds, angleDeg, baseline) {
    if (angleDeg === 0) return cmds;
    const t = Math.tan(angleDeg * Math.PI / 180);
    for (const c of cmds) {
      if (c.x !== undefined) c.x += (baseline - c.y) * t;
      if (c.x1 !== undefined) c.x1 += (baseline - c.y1) * t;
      if (c.x2 !== undefined) c.x2 += (baseline - c.y2) * t;
    }
    return cmds;
  }

  // 3. Roughen — subdivide cubic beziers and jitter midpoints
  function applyRoughen(cmds, amount, detail, rng) {
    if (amount === 0) return cmds;
    let result = cmds;
    for (let pass = 0; pass < detail; pass++) {
      const subdivided = [];
      let px = 0, py = 0;
      for (const c of result) {
        if (c.type === 'C') {
          const mx1 = (px + c.x1) / 2;
          const my1 = (py + c.y1) / 2;
          const mx2 = (c.x1 + c.x2) / 2;
          const my2 = (c.y1 + c.y2) / 2;
          const mx3 = (c.x2 + c.x) / 2;
          const my3 = (c.y2 + c.y) / 2;
          const mx4 = (mx1 + mx2) / 2;
          const my4 = (my1 + my2) / 2;
          const mx5 = (mx2 + mx3) / 2;
          const my5 = (my2 + my3) / 2;
          const mx6 = (mx4 + mx5) / 2;
          const my6 = (my4 + my5) / 2;
          const jx = (rng() - 0.5) * amount;
          const jy = (rng() - 0.5) * amount;
          subdivided.push({ type: 'C', x1: mx1, y1: my1, x2: mx4, y2: my4, x: mx6 + jx, y: my6 + jy });
          subdivided.push({ type: 'C', x1: mx5 + jx, y1: my5 + jy, x2: mx3, y2: my3, x: c.x, y: c.y });
          px = c.x; py = c.y;
        } else if (c.type === 'Q') {
          const cx1 = px + 2/3 * (c.x1 - px);
          const cy1 = py + 2/3 * (c.y1 - py);
          const cx2 = c.x + 2/3 * (c.x1 - c.x);
          const cy2 = c.y + 2/3 * (c.y1 - c.y);
          const fakeC = { type: 'C', x1: cx1, y1: cy1, x2: cx2, y2: cy2, x: c.x, y: c.y };
          const sub = applyRoughen([{ type: 'M', x: px, y: py }, fakeC], amount, 1, rng);
          subdivided.push(...sub.slice(1));
          px = c.x; py = c.y;
        } else if (c.type === 'L') {
          const mx = (px + c.x) / 2 + (rng() - 0.5) * amount;
          const my = (py + c.y) / 2 + (rng() - 0.5) * amount;
          subdivided.push({ type: 'L', x: mx, y: my });
          subdivided.push({ type: 'L', x: c.x, y: c.y });
          px = c.x; py = c.y;
        } else {
          subdivided.push(c);
          if (c.x !== undefined) { px = c.x; py = c.y; }
        }
      }
      result = subdivided;
    }
    return result;
  }

  // 4. Noise displacement — perturb all points with spatial noise
  function applyDisplacement(cmds, amount, scale, noise) {
    if (amount === 0) return cmds;
    for (const c of cmds) {
      if (c.x !== undefined && c.type !== 'Z') {
        c.x += noise(c.x * scale * 0.01, c.y * scale * 0.01) * amount;
        c.y += noise(c.x * scale * 0.01 + 100, c.y * scale * 0.01 + 100) * amount;
      }
      if (c.x1 !== undefined) {
        c.x1 += noise(c.x1 * scale * 0.01 + 200, c.y1 * scale * 0.01 + 200) * amount;
        c.y1 += noise(c.x1 * scale * 0.01 + 300, c.y1 * scale * 0.01 + 300) * amount;
      }
      if (c.x2 !== undefined) {
        c.x2 += noise(c.x2 * scale * 0.01 + 400, c.y2 * scale * 0.01 + 400) * amount;
        c.y2 += noise(c.x2 * scale * 0.01 + 500, c.y2 * scale * 0.01 + 500) * amount;
      }
    }
    return cmds;
  }

  // 5. Cursor push — repel points away from mouse position
  function applyCursorPush(cmds, mx, my, radius, strength) {
    if (strength === 0 || mx < -9000) return cmds;
    const r2 = radius * radius;
    function pushPoint(px, py) {
      const dx = px - mx, dy = py - my;
      const d2 = dx * dx + dy * dy;
      if (d2 > r2 || d2 < 0.01) return { x: px, y: py };
      const dist = Math.sqrt(d2);
      // Smooth falloff: (1 - dist/radius)^2
      const t = 1 - dist / radius;
      const force = t * t * strength;
      return { x: px + (dx / dist) * force, y: py + (dy / dist) * force };
    }
    for (const c of cmds) {
      if (c.x !== undefined && c.type !== 'Z') {
        const p = pushPoint(c.x, c.y);
        c.x = p.x; c.y = p.y;
      }
      if (c.x1 !== undefined) {
        const p = pushPoint(c.x1, c.y1);
        c.x1 = p.x; c.y1 = p.y;
      }
      if (c.x2 !== undefined) {
        const p = pushPoint(c.x2, c.y2);
        c.x2 = p.x; c.y2 = p.y;
      }
    }
    return cmds;
  }

  // Run the full transform pipeline on path commands (for preview — includes cursor push)
  function transformCommands(cmds, params, baseline) {
    let result = cloneCommands(cmds);
    result = applyWeight(result, params.weight);
    result = applySlant(result, params.slant, baseline);
    const rng = mulberry32(params.dispSeed + 7777);
    result = applyRoughen(result, params.roughAmount, params.roughDetail, rng);
    const noise = createNoise2D(params.dispSeed);
    result = applyDisplacement(result, params.dispAmount, params.dispScale, noise);
    result = applyCursorPush(result, mouseX, mouseY, params.pushRadius, params.pushStrength);
    return result;
  }

  // Export version — no cursor push
  function transformCommandsForExport(cmds, params, baseline) {
    let result = cloneCommands(cmds);
    result = applyWeight(result, params.weight);
    result = applySlant(result, params.slant, baseline);
    const rng = mulberry32(params.dispSeed + 7777);
    result = applyRoughen(result, params.roughAmount, params.roughDetail, rng);
    const noise = createNoise2D(params.dispSeed);
    result = applyDisplacement(result, params.dispAmount, params.dispScale, noise);
    return result;
  }

  // Draw path commands to canvas
  function drawCommands(ctx, cmds) {
    ctx.beginPath();
    for (const c of cmds) {
      switch (c.type) {
        case 'M': ctx.moveTo(c.x, c.y); break;
        case 'L': ctx.lineTo(c.x, c.y); break;
        case 'C': ctx.bezierCurveTo(c.x1, c.y1, c.x2, c.y2, c.x, c.y); break;
        case 'Q': ctx.quadraticCurveTo(c.x1, c.y1, c.x, c.y); break;
        case 'Z': ctx.closePath(); break;
      }
    }
  }

  // ── Canvas sizing ──
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = wrapper.getBoundingClientRect();
    const w = rect.width;
    const h = rect.height - 36;
    cv.width = w * dpr;
    cv.height = h * dpr;
    cv.style.width = w + 'px';
    cv.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    dirty = true;
  }
  window.addEventListener('resize', resizeCanvas);

  // ── Main render ──
  function render() {
    if (!baseFont || !dirty) { requestAnimationFrame(render); return; }
    dirty = false;
    const p = getParams();
    const w = cv.width / (window.devicePixelRatio || 1);
    const h = cv.height / (window.devicePixelRatio || 1);

    // Clear
    ctx.fillStyle = p.bgColor;
    ctx.fillRect(0, 0, w, h);

    const padding = 40;
    const lineHeight = p.fontSize * 1.35;
    const maxWidth = w - padding * 2;
    const lines = p.text.split('\n');
    let cursorY = padding + p.fontSize;

    // Scale factor from font units to display
    const scale = p.fontSize / baseFont.unitsPerEm;

    for (const line of lines) {
      if (cursorY - p.fontSize > h) break;

      const glyphRuns = [];
      let runX = padding;
      for (let i = 0; i < line.length; i++) {
        const glyph = baseFont.charToGlyph(line[i]);
        const advance = (glyph.advanceWidth || 0) * scale;

        if (runX + advance > padding + maxWidth && glyphRuns.length > 0) {
          drawGlyphRun(glyphRuns, cursorY, p, scale);
          glyphRuns.length = 0;
          runX = padding;
          cursorY += lineHeight;
          if (cursorY - p.fontSize > h) break;
        }

        glyphRuns.push({ glyph, x: runX, advance });
        runX += advance;
      }

      // Baseline guide
      if (p.showBaselines && glyphRuns.length > 0) {
        ctx.strokeStyle = 'rgba(0,255,136,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, cursorY);
        ctx.lineTo(w - padding, cursorY);
        ctx.stroke();
      }

      drawGlyphRun(glyphRuns, cursorY, p, scale);
      cursorY += lineHeight;
    }

    // Draw cursor radius indicator when hovering
    if (mouseX > -9000 && p.pushStrength > 0) {
      ctx.strokeStyle = 'rgba(0,255,136,0.2)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, p.pushRadius, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    requestAnimationFrame(render);
  }

  function drawGlyphRun(glyphs, baselineY, params, scale) {
    ctx.fillStyle = params.textColor;
    for (const { glyph, x } of glyphs) {
      if (!glyph.path || !glyph.path.commands || glyph.path.commands.length === 0) continue;
      const path = glyph.getPath(x, baselineY, params.fontSize);
      const cmds = transformCommands(path.commands, params, baselineY);
      drawCommands(ctx, cmds);
      ctx.fill('nonzero');
    }
  }

  // ── Export OTF ──
  $('exportOTFBtn').addEventListener('click', () => {
    if (!baseFont) return;
    const p = getParams();
    const upm = baseFont.unitsPerEm;
    const notdefGlyph = new opentype.Glyph({
      name: '.notdef',
      unicode: 0,
      advanceWidth: upm / 2,
      path: new opentype.Path()
    });

    const glyphs = [notdefGlyph];

    for (let code = 32; code <= 126; code++) {
      const char = String.fromCharCode(code);
      const srcGlyph = baseFont.charToGlyph(char);
      if (!srcGlyph || !srcGlyph.path) continue;

      const srcCmds = srcGlyph.path.commands;
      if (srcCmds.length === 0 && code === 32) {
        glyphs.push(new opentype.Glyph({
          name: 'space',
          unicode: 32,
          advanceWidth: srcGlyph.advanceWidth || upm / 4,
          path: new opentype.Path()
        }));
        continue;
      }

      const baseline = baseFont.tables.os2 ? baseFont.tables.os2.sTypoAscender : upm * 0.8;
      const transformed = transformCommandsForExport(cloneCommands(srcCmds), p, baseline);

      const newPath = new opentype.Path();
      for (const c of transformed) {
        switch (c.type) {
          case 'M': newPath.moveTo(c.x, c.y); break;
          case 'L': newPath.lineTo(c.x, c.y); break;
          case 'C': newPath.curveTo(c.x1, c.y1, c.x2, c.y2, c.x, c.y); break;
          case 'Q': newPath.quadTo(c.x1, c.y1, c.x, c.y); break;
          case 'Z': newPath.close(); break;
        }
      }

      glyphs.push(new opentype.Glyph({
        name: srcGlyph.name || 'char' + code,
        unicode: code,
        advanceWidth: srcGlyph.advanceWidth || upm / 2,
        path: newPath
      }));
    }

    const exportFont = new opentype.Font({
      familyName: 'LiquidFont-Custom',
      styleName: 'Regular',
      unitsPerEm: upm,
      ascender: baseFont.ascender,
      descender: baseFont.descender,
      glyphs: glyphs
    });

    exportFont.download('LiquidFont-custom.otf');
  });

  // ── Export PNG ──
  $('exportPNGBtn').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'LiquidFont-preview.png';
    link.href = cv.toDataURL('image/png');
    link.click();
  });

  // ── Load font ──
  const FONT_URL = 'https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/inter/Inter%5Bopsz%2Cwght%5D.ttf';
  const FONT_URL_FALLBACK = 'https://cdn.jsdelivr.net/gh/rsms/inter@v4.0/docs/font-files/Inter-Regular.otf';

  function loadFont(url) {
    return new Promise((resolve, reject) => {
      opentype.load(url, (err, font) => {
        if (err) reject(err);
        else resolve(font);
      });
    });
  }

  async function init() {
    try {
      baseFont = await loadFont(FONT_URL);
    } catch (e) {
      console.warn('Primary font URL failed, trying fallback...', e);
      try {
        baseFont = await loadFont(FONT_URL_FALLBACK);
      } catch (e2) {
        console.error('Both font URLs failed:', e2);
        $('loading').textContent = 'Failed to load font. Check console.';
        return;
      }
    }
    $('loading').classList.add('hidden');
    resizeCanvas();
    requestAnimationFrame(render);
  }

  init();
})();
</script>
<script src="editor.js"></script>
</body>
</html>
